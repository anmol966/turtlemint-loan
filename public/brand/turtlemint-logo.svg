<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" fill="none" role="img" aria-label="Turtlemint">
  <!-- Wordmark: turtlemint -->
  <text
    x="0"
    y="52"
    font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif"
    font-size="48"
    font-weight="700"
    letter-spacing="-1"
    fill="#2BB673"
  >turtlemint</text>

  <!-- Turtle mark: shell (dark green) + head (mint green) -->
  <!-- Shell: rounded square rotated slightly -->
  <g transform="translate(266, 4)">
    <!-- Shell body -->
    <rect x="6" y="12" width="36" height="36" rx="10" fill="#1B7A5A" transform="rotate(-5 24 30)"/>
    <!-- Head accent -->
    <ellipse cx="40" cy="12" rx="10" ry="12" fill="#2BB673" transform="rotate(15 40 12)"/>
    <!-- Small flipper hint -->
    <ellipse cx="44" cy="28" rx="6" ry="4" fill="#2BB673" transform="rotate(30 44 28)" opacity="0.7"/>
  </g>
</svg>
